<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Tailwind and DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8fafc]">
    <header class="w-[95%] sm:max-w-6xl mx-auto pt-4 sm:pt-14">
        <h1 class="font-bold text-[2rem] my-5 text-[#002c5c]">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4 pb-7">
            <div class="p-5 bg-white border border-base-300 rounded-lg">
                <p class="mb-2">Total</p>
                <p id="total-job-count" class="font-bold text-2xl text-[#002c5c]">0</p>
            </div>
            <div class="p-5 bg-white border border-base-300 rounded-lg">
                <p class="mb-2">Interview</p>
                <p id="interview-job-count" class="font-bold text-2xl text-[#10b981]">0</p>
            </div>
            <div class="p-5 bg-white border border-base-300 rounded-lg">
                <p class="mb-2">Rejected</p>
                <p id="rejected-job-count" class="font-bold text-2xl text-[#ef4444]">0</p>
            </div>
        </div>
        <hr class="border-base-300">
    </header>

    <main class="w-[95%] sm:max-w-6xl mx-auto pt-7">
        <div class="flex justify-between">
            <div>
                <h2 class="text-[#002c5c] font-semibold text-xl mb-6">Available Jobs</h2>
                <div class="flex gap-2">
                    <button class="filter-btn btn btn-outline btn-info btn-active w-24">All</button>
                    <button class="filter-btn btn btn-outline btn-info w-24">Interview</button>
                    <button class="filter-btn btn btn-outline btn-info w-24">Rejected</button>
                </div>
            </div>
            <div>
                <p class="text-[#64748b] font-medium"><span class="hidden" id="filter-job-text"><span id="filter-jobs-counter">0</span> of</span> 8 jobs</p>
            </div>
        </div>

        <section id="all-jobs-container" class="py-4 space-y-2">
            
        </section>

        <section id="interview-container" class="py-4 space-y-2 hidden">
            <div id="no-interview-card" class="bg-white rounded-lg border border-base-300 py-20 text-center">
                <img class="mx-auto mb-5" src="./asset/jobs.png" alt="">
                <h2 class="text-[#002C5C] font-semibold text-2xl mb-1">No jobs available</h2>
                <p class="text-[#64748B]">Check back soon for new job opportunities</p>
            </div>
        </section>

        <section id="rejected-container" class="py-4 space-y-2 hidden">
            <div id="no-rejected-card" class="bg-white rounded-lg border border-base-300 py-20 text-center">
                <img class="mx-auto mb-5" src="./asset/jobs.png" alt="">
                <h2 class="text-[#002C5C] font-semibold text-2xl mb-1">No jobs available</h2>
                <p class="text-[#64748B]">Check back soon for new job opportunities</p>
            </div>
        </section>
    </main>

    <script src="./job-data.js"></script>
    <script src="./machine.js"></script>
    <script src="./script.js"></script>
</body>

</html>
